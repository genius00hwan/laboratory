services:
  mysql:
    image: mysql:8.0.36
    container_name: mysql-read-inmemory-data
    restart: unless-stopped
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: read_inmemory_data
      MYSQL_USER: lab
      MYSQL_PASSWORD: lab
    command:
      - --default-authentication-plugin=mysql_native_password
      - --transaction-isolation=REPEATABLE-READ
      - --innodb-lock-wait-timeout=5
      - --log-error-verbosity=3
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2-alpine
    container_name: redis-read-inmemory-data
    restart: unless-stopped
    ports:
      - "6381:6379"
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"

volumes:
  mysql_data:
